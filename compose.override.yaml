services:
  openmrs:
    extends: 
        file: compose.yaml
        service: openmrs
    environment:
      DEBUG: ${TOMCAT_DEBUG:-"false"}
    ports:
      - ${TOMCAT_DEBUG_PORT:-1044}:1044

  db:
    extends: 
      file: compose.yaml
      service: db
    ports:
      - ${MYSQL_PORT:-3306}:3306

volumes:
  db-data:
  openmrs-data: